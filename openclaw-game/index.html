<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 人机交互 - 头部接水果</title>
    <!-- MediaPipe CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========== 顶部状态栏 ========== */
        #hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 100;
            pointer-events: none;
        }

        #hud .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #hud .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
        }

        #hud .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00f5d4, #00bbf9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #hud .stat-value.lives {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #hud .stat-value.combo {
            background: linear-gradient(135deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ========== 游戏画布 ========== */
        #game-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        #video {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 5;
        }

        /* ========== 启动界面 ========== */
        #start-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 100%);
        }

        #start-screen h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #00f5d4, #00bbf9, #9b5de5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        #start-screen .subtitle {
            font-size: 18px;
            color: #888;
            margin-bottom: 48px;
        }

        #start-screen .instructions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 600px;
            margin-bottom: 48px;
        }

        .instruction-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .instruction-card .icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .instruction-card .title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #00f5d4;
        }

        .instruction-card .desc {
            font-size: 12px;
            color: #666;
        }

        #start-btn {
            padding: 16px 48px;
            font-size: 18px;
            font-weight: 700;
            color: #0a0a1a;
            background: linear-gradient(135deg, #00f5d4, #00bbf9);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0,245,212,0.4);
        }

        /* ========== 加载状态 ========== */
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 300;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #loading .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #00f5d4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #loading .text {
            font-size: 14px;
            color: #888;
        }

        /* ========== 游戏结束界面 ========== */
        #gameover-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10,10,26,0.92);
            backdrop-filter: blur(8px);
        }

        #gameover-screen h2 {
            font-size: 42px;
            font-weight: 900;
            color: #ff6b6b;
            margin-bottom: 8px;
        }

        #gameover-screen .final-score {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        #gameover-screen .final-label {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        #gameover-screen .stats-row {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }

        #gameover-screen .mini-stat {
            text-align: center;
        }

        #gameover-screen .mini-stat .val {
            font-size: 24px;
            font-weight: 700;
            color: #00f5d4;
        }

        #gameover-screen .mini-stat .lbl {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        #restart-btn {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 700;
            color: #0a0a1a;
            background: linear-gradient(135deg, #00f5d4, #00bbf9);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #restart-btn:hover { transform: scale(1.05); }

        /* ========== Toast 通知 ========== */
        #toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 150;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.success { background: rgba(0,245,212,0.9); color: #0a0a1a; }
        #toast.warning { background: rgba(255,107,107,0.9); color: #fff; }
        #toast.info { background: rgba(0,187,249,0.9); color: #fff; }

        /* ========== 难度指示器 ========== */
        #level-indicator {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 8px 16px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            pointer-events: none;
        }

        .level-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: background 0.3s;
        }

        .level-dot.active {
            background: #00f5d4;
            box-shadow: 0 0 8px rgba(0,245,212,0.6);
        }

        #level-text {
            font-size: 12px;
            color: #888;
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <!-- 隐藏的 video 元素用于摄像头输入 -->
    <video id="video" autoplay playsinline></video>

    <!-- 游戏画布 -->
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
        <div class="stat">
            <span class="stat-label">得分</span>
            <span class="stat-value" id="score-display">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">连击</span>
            <span class="stat-value combo" id="combo-display">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">生命</span>
            <span class="stat-value lives" id="lives-display">5</span>
        </div>
    </div>

    <!-- 难度指示器 -->
    <div id="level-indicator">
        <div class="level-dot active" id="dot-1"></div>
        <div class="level-dot" id="dot-2"></div>
        <div class="level-dot" id="dot-3"></div>
        <div class="level-dot" id="dot-4"></div>
        <div class="level-dot" id="dot-5"></div>
        <span id="level-text">等级 1</span>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- 启动界面 -->
    <div id="start-screen">
        <h1>🍉 头部接水果</h1>
        <p class="subtitle">移动你的头部来接住掉落的水果</p>
        <div class="instructions">
            <div class="instruction-card">
                <div class="icon">🎥</div>
                <div class="title">摄像头追踪</div>
                <div class="desc">AI 实时检测你的面部位置</div>
            </div>
            <div class="instruction-card">
                <div class="icon">↔️</div>
                <div class="title">左右移动</div>
                <div class="desc">移动头部控制篮子位置</div>
            </div>
            <div class="instruction-card">
                <div class="icon">🍉</div>
                <div class="title">接住水果</div>
                <div class="desc">得分 +10, 连击加成更多</div>
            </div>
            <div class="instruction-card">
                <div class="icon">💣</div>
                <div class="title">躲避炸弹</div>
                <div class="desc">碰到炸弹扣一条命</div>
            </div>
        </div>
        <button id="start-btn">开始游戏</button>
    </div>

    <!-- 加载 -->
    <div id="loading">
        <div class="spinner"></div>
        <div class="text" id="loading-text">正在加载人脸检测模型...</div>
    </div>

    <!-- 游戏结束 -->
    <div id="gameover-screen">
        <h2>游戏结束</h2>
        <div class="final-score" id="final-score">0</div>
        <div class="final-label">最终得分</div>
        <div class="stats-row">
            <div class="mini-stat">
                <div class="val" id="stat-caught">0</div>
                <div class="lbl">接住水果</div>
            </div>
            <div class="mini-stat">
                <div class="val" id="stat-missed">0</div>
                <div class="lbl">漏掉水果</div>
            </div>
            <div class="mini-stat">
                <div class="val" id="stat-max-combo">0</div>
                <div class="lbl">最高连击</div>
            </div>
            <div class="mini-stat">
                <div class="val" id="stat-level">1</div>
                <div class="lbl">到达等级</div>
            </div>
        </div>
        <button id="restart-btn">再来一局</button>
    </div>

    <script>
    // =====================================================
    //  全局状态
    // =====================================================
    const G = {
        running: false,
        score: 0,
        lives: 5,
        combo: 0,
        maxCombo: 0,
        caught: 0,
        missed: 0,
        level: 1,
        // 人脸追踪
        faceX: 0.5,        // 归一化 0~1
        faceY: 0.5,
        faceDetected: false,
        faceRaw: null,     // 原始检测结果
        // 游戏对象
        items: [],
        particles: [],
        floatingTexts: [],
        basketX: 0.5,      // 篮子位置 (归一化)
        basketWidth: 120,
        // 难度参数
        spawnInterval: 1200,  // ms
        fallSpeed: 2.5,
        lastSpawn: 0,
        // 时间
        lastTime: 0,
    };

    // =====================================================
    //  DOM 引用
    // =====================================================
    const video       = document.getElementById('video');
    const canvas      = document.getElementById('game-canvas');
    const ctx         = canvas.getContext('2d');
    const scoreEl     = document.getElementById('score-display');
    const comboEl     = document.getElementById('combo-display');
    const livesEl     = document.getElementById('lives-display');
    const startScreen = document.getElementById('start-screen');
    const loadingEl   = document.getElementById('loading');
    const loadingText = document.getElementById('loading-text');
    const gameoverEl  = document.getElementById('gameover-screen');
    const toastEl     = document.getElementById('toast');

    // =====================================================
    //  Canvas 尺寸
    // =====================================================
    function resizeCanvas() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // =====================================================
    //  Toast 系统
    // =====================================================
    let toastTimer = null;
    function showToast(msg, type = 'info', duration = 1500) {
        toastEl.textContent = msg;
        toastEl.className = type + ' show';
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { toastEl.className = type; }, duration);
    }

    // =====================================================
    //  MediaPipe Face Mesh 初始化
    // =====================================================
    let faceMesh = null;
    let cameraInstance = null;

    async function initFaceMesh() {
        loadingEl.style.display = 'flex';
        loadingText.textContent = '正在加载人脸检测模型...';

        try {
            faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5,
            });

            faceMesh.onResults(onFaceResults);

            loadingText.textContent = '正在启动摄像头...';

            cameraInstance = new Camera(video, {
                onFrame: async () => {
                    await faceMesh.send({ image: video });
                },
                width: 1280,
                height: 720,
            });

            await cameraInstance.start();
            loadingEl.style.display = 'none';
            showToast('摄像头就绪，人脸检测已启动', 'success');
            return true;
        } catch (err) {
            console.error('FaceMesh init error:', err);
            loadingText.textContent = '加载失败，请允许摄像头权限后刷新页面';
            return false;
        }
    }

    // =====================================================
    //  人脸检测结果回调
    // =====================================================
    function onFaceResults(results) {
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            const landmarks = results.multiFaceLandmarks[0];
            // 鼻尖是 landmark 1, 用它作为头部位置
            const noseTip = landmarks[1];
            // MediaPipe 返回的是归一化坐标 0~1，视频是镜像的所以 X 取反
            G.faceX = 1 - noseTip.x;
            G.faceY = noseTip.y;
            G.faceDetected = true;
            G.faceRaw = landmarks;
        } else {
            G.faceDetected = false;
        }
    }

    // =====================================================
    //  水果 & 物品系统
    // =====================================================
    const FRUIT_TYPES = [
        { emoji: '🍉', points: 10, weight: 30 },
        { emoji: '🍊', points: 10, weight: 25 },
        { emoji: '🍎', points: 10, weight: 25 },
        { emoji: '🍇', points: 15, weight: 15 },
        { emoji: '🍓', points: 15, weight: 10 },
        { emoji: '🌟', points: 30, weight: 5 },   // 星星 - 高分
        { emoji: '💎', points: 50, weight: 2 },    // 钻石 - 超高分
        { emoji: '💣', points: -1, weight: 8 },    // 炸弹
    ];

    function pickFruitType() {
        const totalWeight = FRUIT_TYPES.reduce((s, f) => s + f.weight, 0);
        let r = Math.random() * totalWeight;
        for (const ft of FRUIT_TYPES) {
            r -= ft.weight;
            if (r <= 0) return ft;
        }
        return FRUIT_TYPES[0];
    }

    function spawnItem() {
        const type = pickFruitType();
        G.items.push({
            x: 0.1 + Math.random() * 0.8,
            y: -0.05,
            speed: G.fallSpeed * (0.8 + Math.random() * 0.4),
            type: type,
            size: 36 + Math.random() * 16,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 4,
            wobble: Math.random() * Math.PI * 2,
            wobbleSpeed: 1 + Math.random() * 2,
            wobbleAmp: 0.005 + Math.random() * 0.015,
        });
    }

    // =====================================================
    //  粒子系统
    // =====================================================
    function spawnParticles(x, y, color, count = 12) {
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
            const speed = 2 + Math.random() * 4;
            G.particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 2,
                life: 1,
                decay: 0.015 + Math.random() * 0.02,
                size: 3 + Math.random() * 5,
                color,
            });
        }
    }

    // =====================================================
    //  浮动文字
    // =====================================================
    function spawnFloatingText(x, y, text, color) {
        G.floatingTexts.push({
            x, y, text, color,
            life: 1,
            vy: -2,
        });
    }

    // =====================================================
    //  碰撞检测
    // =====================================================
    function checkCollision(item) {
        const basketPixelX = G.basketX * canvas.width;
        const basketLeft   = basketPixelX - G.basketWidth / 2;
        const basketRight  = basketPixelX + G.basketWidth / 2;
        const basketY      = canvas.height - 80;

        const itemPixelX = item.x * canvas.width;
        const itemPixelY = item.y * canvas.height;
        const itemRadius = item.size / 2;

        return (
            itemPixelY + itemRadius >= basketY - 20 &&
            itemPixelY - itemRadius <= basketY + 30 &&
            itemPixelX + itemRadius >= basketLeft &&
            itemPixelX - itemRadius <= basketRight
        );
    }

    // =====================================================
    //  HUD 更新
    // =====================================================
    function updateHUD() {
        scoreEl.textContent = G.score;
        comboEl.textContent = G.combo > 0 ? `x${G.combo}` : '0';
        livesEl.textContent = '❤'.repeat(Math.max(0, G.lives));

        // 等级指示器
        const lvl = Math.min(5, G.level);
        for (let i = 1; i <= 5; i++) {
            document.getElementById(`dot-${i}`).className =
                'level-dot' + (i <= lvl ? ' active' : '');
        }
        document.getElementById('level-text').textContent = `等级 ${lvl}`;
    }

    // =====================================================
    //  难度系统
    // =====================================================
    function updateDifficulty() {
        const newLevel = Math.min(5, 1 + Math.floor(G.score / 100));
        if (newLevel !== G.level) {
            G.level = newLevel;
            G.spawnInterval = Math.max(400, 1200 - (G.level - 1) * 150);
            G.fallSpeed = 2.5 + (G.level - 1) * 0.6;
            showToast(`难度提升！等级 ${G.level}`, 'info');
        }
    }

    // =====================================================
    //  绘制函数
    // =====================================================
    function drawBasket() {
        const px = G.basketX * canvas.width;
        const py = canvas.height - 65;
        const w  = G.basketWidth;
        const h  = 40;

        ctx.save();
        ctx.translate(px, py);

        // 篮子阴影
        ctx.shadowColor = 'rgba(0, 245, 212, 0.3)';
        ctx.shadowBlur = 20;

        // 篮子主体 - 梯形
        ctx.beginPath();
        ctx.moveTo(-w / 2, 0);
        ctx.lineTo(-w / 2 + 12, h);
        ctx.lineTo(w / 2 - 12, h);
        ctx.lineTo(w / 2, 0);
        ctx.closePath();

        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#00f5d4');
        grad.addColorStop(1, '#00bbf9');
        ctx.fillStyle = grad;
        ctx.fill();

        // 篮子边框
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.shadowBlur = 0;

        // 篮子横纹
        for (let i = 1; i <= 3; i++) {
            const t = i / 4;
            const ly = h * t;
            const lw = w / 2 - 12 * t;
            ctx.beginPath();
            ctx.moveTo(-lw, ly);
            ctx.lineTo(lw, ly);
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        ctx.restore();
    }

    function drawFaceMarker() {
        if (!G.faceDetected) return;
        const px = G.faceX * canvas.width;
        const py = G.faceY * canvas.height;

        // 人脸位置指示器 - 光环
        ctx.save();
        ctx.beginPath();
        ctx.arc(px, py, 30, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0, 245, 212, 0.4)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 小十字
        ctx.beginPath();
        ctx.moveTo(px - 8, py);
        ctx.lineTo(px + 8, py);
        ctx.moveTo(px, py - 8);
        ctx.lineTo(px, py + 8);
        ctx.strokeStyle = 'rgba(0, 245, 212, 0.6)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // 绘制面部轮廓点
        if (G.faceRaw) {
            // 画几个关键点 - 眼睛、鼻子、嘴巴
            const keyPoints = [1, 33, 263, 61, 291, 13]; // 鼻尖、左眼、右眼、左嘴、右嘴、上唇
            for (const idx of keyPoints) {
                const pt = G.faceRaw[idx];
                const ptx = (1 - pt.x) * canvas.width;
                const pty = pt.y * canvas.height;
                ctx.beginPath();
                ctx.arc(ptx, pty, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 245, 212, 0.7)';
                ctx.fill();
            }
        }

        ctx.restore();
    }

    function drawItems(dt) {
        for (const item of G.items) {
            item.wobble += item.wobbleSpeed * dt;
            item.rotation += item.rotSpeed * dt;

            const px = item.x * canvas.width + Math.sin(item.wobble) * 15;
            const py = item.y * canvas.height;

            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(item.rotation);

            // 物品阴影/光晕
            if (item.type.points > 0) {
                ctx.shadowColor = item.type.emoji === '💣' ? 'transparent' :
                    item.type.emoji === '💎' ? 'rgba(100,149,237,0.6)' :
                    item.type.emoji === '🌟' ? 'rgba(255,217,61,0.6)' :
                    'rgba(0,0,0,0.3)';
                ctx.shadowBlur = item.type.points >= 30 ? 15 : 5;
            }

            ctx.font = `${item.size}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(item.type.emoji, 0, 0);

            ctx.restore();
        }
    }

    function drawParticles() {
        for (const p of G.particles) {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function drawFloatingTexts() {
        for (const ft of G.floatingTexts) {
            ctx.save();
            ctx.globalAlpha = ft.life;
            ctx.font = 'bold 24px system-ui';
            ctx.textAlign = 'center';
            ctx.fillStyle = ft.color;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fillText(ft.text, ft.x, ft.y);
            ctx.restore();
        }
    }

    function drawFaceNotFound() {
        if (G.faceDetected) return;
        ctx.save();
        ctx.font = '16px system-ui';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,107,107,0.8)';
        ctx.fillText('未检测到人脸 - 请面对摄像头', canvas.width / 2, canvas.height / 2);
        ctx.restore();
    }

    // =====================================================
    //  游戏逻辑更新
    // =====================================================
    function update(dt) {
        if (!G.running) return;

        // 平滑跟随人脸位置
        const smoothing = 0.15;
        if (G.faceDetected) {
            G.basketX += (G.faceX - G.basketX) * smoothing;
        }

        // 生成物品
        G.lastSpawn += dt * 1000;
        if (G.lastSpawn >= G.spawnInterval) {
            spawnItem();
            G.lastSpawn = 0;
        }

        // 更新物品
        for (let i = G.items.length - 1; i >= 0; i--) {
            const item = G.items[i];
            item.y += item.speed * dt;

            // 碰撞检测
            if (checkCollision(item)) {
                if (item.type.points === -1) {
                    // 炸弹！
                    G.lives--;
                    G.combo = 0;
                    spawnParticles(item.x * canvas.width, item.y * canvas.height, '#ff6b6b', 20);
                    spawnFloatingText(item.x * canvas.width, item.y * canvas.height, '-1 ❤', '#ff6b6b');
                    showToast('碰到炸弹！', 'warning', 800);
                    if (G.lives <= 0) {
                        gameOver();
                    }
                } else {
                    // 接住水果
                    G.combo++;
                    if (G.combo > G.maxCombo) G.maxCombo = G.combo;
                    const multiplier = 1 + Math.floor(G.combo / 5) * 0.5;
                    const pts = Math.round(item.type.points * multiplier);
                    G.score += pts;
                    G.caught++;
                    const color = item.type.points >= 30 ? '#ffd93d' : '#00f5d4';
                    spawnParticles(item.x * canvas.width, item.y * canvas.height, color, 8);
                    spawnFloatingText(item.x * canvas.width, item.y * canvas.height,
                        `+${pts}${G.combo >= 5 ? ` (x${multiplier})` : ''}`, color);
                }
                G.items.splice(i, 1);
                updateDifficulty();
                continue;
            }

            // 超出屏幕底部
            if (item.y > 1.1) {
                if (item.type.points > 0) {
                    // 漏掉水果
                    G.missed++;
                    G.combo = 0;
                    // 普通水果漏掉不扣命（只有炸弹才扣命，保持游戏体验）
                }
                G.items.splice(i, 1);
            }
        }

        // 更新粒子
        for (let i = G.particles.length - 1; i >= 0; i--) {
            const p = G.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.1; // 重力
            p.life -= p.decay;
            if (p.life <= 0) G.particles.splice(i, 1);
        }

        // 更新浮动文字
        for (let i = G.floatingTexts.length - 1; i >= 0; i--) {
            const ft = G.floatingTexts[i];
            ft.y += ft.vy;
            ft.life -= 0.02;
            if (ft.life <= 0) G.floatingTexts.splice(i, 1);
        }

        updateHUD();
    }

    // =====================================================
    //  主渲染循环
    // =====================================================
    function gameLoop(timestamp) {
        if (!G.lastTime) G.lastTime = timestamp;
        const dt = Math.min((timestamp - G.lastTime) / 1000, 0.1); // 限制最大 dt
        G.lastTime = timestamp;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 半透明暗层（让视频稍暗，游戏元素更突出）
        ctx.fillStyle = 'rgba(10, 10, 26, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (G.running) {
            update(dt);
            drawFaceMarker();
            drawItems(dt);
            drawBasket();
            drawParticles();
            drawFloatingTexts();
        }

        requestAnimationFrame(gameLoop);
    }

    // =====================================================
    //  游戏流程控制
    // =====================================================
    function resetGame() {
        G.score = 0;
        G.lives = 5;
        G.combo = 0;
        G.maxCombo = 0;
        G.caught = 0;
        G.missed = 0;
        G.level = 1;
        G.items = [];
        G.particles = [];
        G.floatingTexts = [];
        G.spawnInterval = 1200;
        G.fallSpeed = 2.5;
        G.lastSpawn = 0;
        G.basketX = 0.5;
    }

    function startGame() {
        resetGame();
        G.running = true;
        updateHUD();
    }

    function gameOver() {
        G.running = false;
        // 填充结果
        document.getElementById('final-score').textContent = G.score;
        document.getElementById('stat-caught').textContent = G.caught;
        document.getElementById('stat-missed').textContent = G.missed;
        document.getElementById('stat-max-combo').textContent = G.maxCombo;
        document.getElementById('stat-level').textContent = G.level;

        gameoverEl.style.display = 'flex';
    }

    // =====================================================
    //  事件绑定
    // =====================================================
    document.getElementById('start-btn').addEventListener('click', async () => {
        startScreen.style.display = 'none';
        const ok = await initFaceMesh();
        if (ok) {
            startGame();
            requestAnimationFrame(gameLoop);
        }
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
        gameoverEl.style.display = 'none';
        startGame();
    });

    // 键盘备用控制（防止摄像头不好用的情况）
    document.addEventListener('keydown', (e) => {
        if (!G.running) return;
        if (e.key === 'ArrowLeft' || e.key === 'a') {
            G.basketX = Math.max(0.05, G.basketX - 0.03);
            G.faceDetected = true; // 模拟检测到
        }
        if (e.key === 'ArrowRight' || e.key === 'd') {
            G.basketX = Math.min(0.95, G.basketX + 0.03);
            G.faceDetected = true;
        }
    });

    // 鼠标备用控制
    canvas.addEventListener('mousemove', (e) => {
        if (!G.running) return;
        G.basketX = e.clientX / canvas.width;
        G.faceDetected = true;
    });
    </script>
</body>
</html>
